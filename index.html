        <header>

        <h1>Simple Steganography</h1>

        <div id="nav">

        <div id="input">

            </div>

            <input class="input-text" placeholder="Enter Password" type="text" min="1" max="8" value="1">
        </div>

        <div id="submit">
            <button>Encode</button>
        </div>
